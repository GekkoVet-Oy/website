{{ $d := .data }}
<section class="section-padding bg-brand-green text-white">
  <div class="max-w-4xl mx-auto text-center">
    <svg class="w-12 h-12 mx-auto mb-6 opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10H14.017zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10H0z"/></svg>
    <blockquote class="text-xl md:text-2xl font-medium mb-6 leading-relaxed">
      {{ $d.quote | safeHTML }}
    </blockquote>
    <p class="text-white/80 font-medium">— {{ $d.attribution }}</p>
    {{ with $d.tagline }}
      <p class="text-white/70 mt-8 text-lg italic">{{ . }}</p>
    {{ end }}
  </div>
</section>
