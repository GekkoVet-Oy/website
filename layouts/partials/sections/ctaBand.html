{{ $d := .data }}
<section class="section-padding bg-brand-dark text-white text-center">
  <div class="max-w-3xl mx-auto">
    <h2 class="text-3xl md:text-4xl font-extrabold mb-4">{{ $d.title | safeHTML }}</h2>
    {{ with $d.body }}
      <p class="text-lg text-gray-300 mb-10">{{ . | safeHTML }}</p>
    {{ end }}
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      {{ range $d.ctas }}
        {{ $external := hasPrefix .url "http" }}
        <a href="{{ partial "url.html" .url }}"{{ if $external }} target="_blank" rel="noopener"{{ end }}
          class="{{ if .primary }}btn-primary{{ else }}btn-secondary !border-white !text-white hover:!bg-white hover:!text-brand-dark{{ end }} text-base !px-7 !py-3.5">
          {{ .label }}
        </a>
      {{ end }}
    </div>
  </div>
</section>
