{{ $d := .data }}
<section class="section-padding bg-white">
  <div class="max-w-4xl mx-auto">
    {{ with $d.title }}
      <h2 class="text-2xl md:text-3xl font-bold text-brand-charcoal text-center mb-8">{{ . }}</h2>
    {{ end }}
    <div class="relative w-full rounded-xl overflow-hidden shadow-lg" style="padding-top: 56.25%;">
      <iframe class="absolute inset-0 w-full h-full"
        src="https://www.youtube.com/embed/{{ $d.youtubeId }}"
        title="{{ default "Video" $d.title }}"
        frameborder="0"
        loading="lazy"
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen></iframe>
    </div>
    {{ with $d.caption }}
      <p class="text-center text-gray-500 mt-4 text-sm">{{ . }}</p>
    {{ end }}
  </div>
</section>
