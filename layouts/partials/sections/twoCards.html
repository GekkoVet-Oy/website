{{ $d := .data }}
<section class="section-padding bg-white">
  <div class="max-w-6xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
      {{ range $d.items }}
        <div class="card border-2 border-transparent hover:border-brand-green p-8">
          <h3 class="text-2xl font-bold text-brand-charcoal mb-4">{{ .title }}</h3>
          <p class="text-gray-600 leading-relaxed mb-6">{{ .body | safeHTML }}</p>
          {{ with .cta }}
            <a href="{{ partial "url.html" .url }}" class="text-brand-green font-semibold hover:text-brand-green-dark transition-colors">{{ .label }} →</a>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </div>
</section>
