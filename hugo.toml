baseURL = 'https://www.gekkovet.com/'
languageCode = 'en-us'
title = 'GekkoVet'
disableKinds = ['taxonomy', 'term', 'RSS']

[params]
  tagline = 'The clinical intelligence layer for veterinary platforms and insurers.'
  description = 'GekkoVet is the clinical intelligence layer for veterinary platforms and insurers — eight years of DVM-validated, evidence-based veterinary knowledge, structured and ready to integrate.'
  copilotURL = 'https://copilot.gekkovet.com'
  compassURL = 'https://compass.gekkovet.com'
  developersURL = 'https://developers.gekkovet.com'
  loginURL = 'https://app.gekkovet.com'
  formspreeEndpoint = 'https://formspree.io/f/mvzykbzw'
  footerTagline = 'The clinical intelligence layer for veterinary platforms and insurers. Built on 8 years of DVM-created knowledge.'

  [params.social]
    instagram = 'https://www.instagram.com/gekkovetus/'
    facebook = 'https://www.facebook.com/gekkovet'
    linkedin = 'https://www.linkedin.com/company/gekkovet-oy'

# ===== Menus =====

[[menus.main]]
  name = 'Solutions'
  weight = 10
  identifier = 'solutions'
  hasChildren = true

[[menus.main]]
  name = 'For PIMS & Platforms'
  parent = 'solutions'
  url = '/pims/'
  weight = 1

[[menus.main]]
  name = 'For Insurers'
  parent = 'solutions'
  url = '/insurers/'
  weight = 2

[[menus.main]]
  name = 'For Veterinarians'
  parent = 'solutions'
  url = '/veterinarians/'
  weight = 3

[[menus.main]]
  name = 'Developers'
  url = 'https://developers.gekkovet.com'
  weight = 20
  [menus.main.params]
    external = true

[[menus.main]]
  name = 'About'
  url = '/about/'
  weight = 30

# ===== Build Settings =====

[build]
  [build.buildStats]
    enable = true

[sitemap]
  changefreq = 'weekly'
  priority = 0.5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
