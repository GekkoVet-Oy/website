baseURL = 'https://www.gekkovet.com/'
languageCode = 'en-us'
title = 'GekkoVet'

[params]
  tagline = 'The Intelligence Layer for Animal Health'
  description = 'GekkoVet provides AI-powered veterinary diagnostic assistance, treatment support, and clinical decision tools for veterinary professionals worldwide.'
  copilotURL = 'https://copilot.gekkovet.com'
  compassURL = 'https://compass.gekkovet.com'
  developersURL = 'https://developers.gekkovet.com'
  compassLoginURL = 'https://compass.gekkovet.com/login'
  compassRegisterURL = 'https://compass.gekkovet.com/register'

  [params.social]
    instagram = 'https://www.instagram.com/gekkovetus/'
    facebook = 'https://www.facebook.com/gekkovet'
    linkedin = 'https://www.linkedin.com/company/gekkovet-oy'

